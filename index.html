<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Top Songs Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body> 
    <h2>Regan Fleetwood</h2>
    <h3>
        Put link here
    </h3>
    <div class="container">
        <h1>Spotify Analytics</h1>
        <p class="subtitle">Explore Spotify's all-time top 100 songs data</p>
        
        <div class="chart-buttons">
            <button class="chart-btn active" onclick="switchChart('songs')">Top Songs</button>
            <button class="chart-btn" onclick="switchChart('years')">Streams by Year</button>
            <button class="chart-btn" onclick="switchChart('genres')">Streams by Genre</button>
        </div>

        <div id="songsControls" class="controls-group active">
            <label for="songCount">Show top:</label>
            <input type="number" id="songCount" min="1" max="100" value="20">
            <span>songs</span>
        </div>

        <div id="songsChart" class="chart-container active"></div>
        <div id="yearsChart" class="chart-container"></div>
        <div id="genresChart" class="chart-container"></div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <script>
        let allData = [];
        let currentChart = 'songs';

        function switchChart(type) {
            // Hide all charts
            document.getElementById('songsChart').classList.remove('active');
            document.getElementById('yearsChart').classList.remove('active');
            document.getElementById('genresChart').classList.remove('active');
            
            // Hide songs controls
            document.getElementById('songsControls').classList.remove('active');
            
            // Update button states
            document.querySelectorAll('.chart-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Show the selected chart
            currentChart = type;
            if (type === 'songs') {
                document.getElementById('songsChart').classList.add('active');
                document.getElementById('songsControls').classList.add('active');
            } else if (type === 'years') {
                document.getElementById('yearsChart').classList.add('active');
            } else {
                document.getElementById('genresChart').classList.add('active');
            }
            
            draw();
        }

        d3.csv("spotify_alltime_top100_songs.csv").then(data => {
            data.forEach(d => {
                d.total_streams_billions = +d.total_streams_billions;
                d.release_year = +d.release_year;
            });
            allData = data;
            draw();

            document.getElementById('songCount').addEventListener('input', draw);
        });

        function draw() {
            if (currentChart === 'songs') drawSongs();
            else if (currentChart === 'years') drawYears();
            else drawGenres();
        }

        function drawSongs() {
            const count = +document.getElementById('songCount').value;
            const sorted = allData.sort((a, b) => b.total_streams_billions - a.total_streams_billions);
            const data = sorted.slice(0, count);

            const margin = { top: 20, right: 30, bottom: 60, left: 320 };
            const width = 1100 - margin.left - margin.right;
            const height = Math.max(400, data.length * 8);

            d3.select("#songsChart").html("");
            const svg = d3.select("#songsChart").append("svg")
                .attr("width", width + margin.left + margin.right)
                .attr("height", height + margin.top + margin.bottom)
                .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

            const x = d3.scaleLinear()
                .domain([0, d3.max(data, d => d.total_streams_billions)])
                .range([0, width]);

            const y = d3.scaleBand()
                .domain(data.map((_, i) => i))
                .range([0, height]).padding(0.3);

            svg.selectAll("rect").data(data).enter().append("rect")
                .attr("class", "bar")
                .attr("y", (_, i) => y(i))
                .attr("width", d => x(d.total_streams_billions))
                .attr("height", y.bandwidth())
                .on("mouseover", (e, d) => showTooltip(e, `${d.song_title}<br/>${d.artist}<br/>${d.total_streams_billions}B streams`))
                .on("mousemove", e => moveTooltip(e))
                .on("mouseout", hideTooltip);

            svg.selectAll(".label").data(data).enter().append("text")
                .attr("class", "title-label")
                .attr("x", -10).attr("y", (_, i) => y(i) + y.bandwidth() / 2)
                .attr("text-anchor", "end").attr("dy", "0.35em")
                .text(d => `${d.song_title} - ${d.artist}`);

            svg.append("g").attr("transform", `translate(0,${height})`).call(d3.axisBottom(x).ticks(5))
                .append("text").attr("x", width / 2).attr("y", 40).attr("fill", "black")
                .attr("text-anchor", "middle").attr("font-weight", "600")
                .text("Total Streams (Billions)");
            svg.append("g").call(d3.axisLeft(y).tickFormat(() => ""));
        }

        function drawYears() {
            const yearData = d3.rollups(
                allData,
                v => d3.sum(v, d => d.total_streams_billions),
                d => d.release_year
            ).sort((a, b) => a[0] - b[0])
            .map(d => ({ year: d[0], streams: d[1], count: allData.filter(x => x.release_year === d[0]).length }));

            const margin = { top: 20, right: 30, bottom: 70, left: 70 };
            const width = 1100 - margin.left - margin.right;
            const height = 400;

            d3.select("#yearsChart").html("");
            const svg = d3.select("#yearsChart").append("svg")
                .attr("width", width + margin.left + margin.right)
                .attr("height", height + margin.top + margin.bottom)
                .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

            const x = d3.scaleBand()
                .domain(yearData.map(d => d.year))
                .range([0, width]).padding(0.2);

            const y = d3.scaleLinear()
                .domain([0, d3.max(yearData, d => d.streams)])
                .range([height, 0]);

            svg.selectAll("rect").data(yearData).enter().append("rect")
                .attr("class", "bar")
                .attr("x", d => x(d.year))
                .attr("y", d => y(d.streams))
                .attr("width", x.bandwidth())
                .attr("height", d => height - y(d.streams))
                .on("mouseover", (e, d) => showTooltip(e, `${d.year}<br/>${d.streams.toFixed(2)}B streams<br/>${d.count} songs`))
                .on("mousemove", e => moveTooltip(e))
                .on("mouseout", hideTooltip);

            svg.selectAll(".label").data(yearData).enter().append("text")
                .attr("x", d => x(d.year) + x.bandwidth() / 2)
                .attr("y", d => y(d.streams) - 5)
                .attr("text-anchor", "middle")
                .text(d => d.streams.toFixed(1) + "B");

            svg.append("g").attr("transform", `translate(0,${height})`).call(d3.axisBottom(x))
                .append("text").attr("x", width / 2).attr("y", 35).attr("fill", "black")
                .attr("text-anchor", "middle").attr("font-weight", "600")
                .text("Release Year");
            svg.append("g").call(d3.axisLeft(y))
                .append("text").attr("transform", "rotate(-90)")
                .attr("x", -height / 2).attr("y", -50).attr("fill", "black")
                .attr("text-anchor", "middle").attr("font-weight", "600")
                .text("Total Streams (Billions)");
        }

        function drawGenres() {
            const genreData = d3.rollups(
                allData,
                v => d3.sum(v, d => d.total_streams_billions),
                d => d.primary_genre
            ).sort((a, b) => b[1] - a[1])
            .map(d => ({ genre: d[0], streams: d[1], count: allData.filter(x => x.primary_genre === d[0]).length }));

            const margin = { top: 20, right: 30, bottom: 40, left: 150 };
            const width = 1100 - margin.left - margin.right;
            const height = 500;

            d3.select("#genresChart").html("");
            const svg = d3.select("#genresChart").append("svg")
                .attr("width", width + margin.left + margin.right)
                .attr("height", height + margin.top + margin.bottom)
                .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

            const x = d3.scaleLinear()
                .domain([0, d3.max(genreData, d => d.streams)])
                .range([0, width]);

            const y = d3.scaleBand()
                .domain(genreData.map(d => d.genre))
                .range([0, height]).padding(0.3);

            svg.selectAll("rect").data(genreData).enter().append("rect")
                .attr("class", "bar")
                .attr("y", d => y(d.genre))
                .attr("width", d => x(d.streams))
                .attr("height", y.bandwidth())
                .on("mouseover", (e, d) => showTooltip(e, `${d.genre}<br/>${d.streams.toFixed(2)}B streams<br/>${d.count} songs`))
                .on("mousemove", e => moveTooltip(e))
                .on("mouseout", hideTooltip);

            svg.selectAll(".label").data(genreData).enter().append("text")
                .attr("x", d => x(d.streams) - 5)
                .attr("y", d => y(d.genre) + y.bandwidth() / 2)
                .attr("text-anchor", "end").attr("dy", "0.35em")
                .attr("class", "value-label")
                .text(d => d.streams.toFixed(1) + "B");

            svg.append("g").attr("transform", `translate(0,${height})`).call(d3.axisBottom(x).ticks(5))
                .append("text").attr("x", width / 2).attr("y", 40).attr("fill", "black")
                .attr("text-anchor", "middle").attr("font-weight", "600")
                .text("Total Streams (Billions)");
            svg.append("g").call(d3.axisLeft(y));
        }

        function showTooltip(e, text) {
            d3.select("#tooltip").style("display", "block")
                .style("left", (e.pageX + 10) + "px").style("top", (e.pageY - 10) + "px")
                .html(text);
        }

        function moveTooltip(e) {
            d3.select("#tooltip").style("left", (e.pageX + 10) + "px").style("top", (e.pageY - 10) + "px");
        }

        function hideTooltip() {
            d3.select("#tooltip").style("display", "none");
        }
    </script>
</body>
</html>
