<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Top Songs Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            align-items: center;
        }
        label {
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        input {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            width: 100px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        #chart {
            margin-top: 20px;
        }
        svg {
            width: 100%;
            height: auto;
        }
        .bar {
            fill: #667eea;
            transition: fill 0.2s;
            cursor: pointer;
        }
        .bar:hover {
            fill: #764ba2;
        }
        .axis-label {
            font-size: 12px;
            fill: #666;
        }
        .tooltip {
            position: absolute;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            z-index: 100;
        }
        .title-label {
            font-size: 11px;
            fill: #333;
            font-weight: 500;
        }
        .value-label {
            font-size: 11px;
            fill: white;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Spotify All-Time Top Songs</h1>
        <p class="subtitle">Most Streamed Tracks (Total Streams in Billions)</p>
        
        <div class="controls">
            <label for="songCount">Show top:</label>
            <input type="number" id="songCount" min="1" max="100" value="20">
            <span>songs</span>
        </div>

        <div id="chart"></div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <script>
        // Load and process data
        d3.csv("spotify_alltime_top100_songs.csv").then(data => {
            // Convert strings to numbers
            data.forEach(d => {
                d.alltime_rank = +d.alltime_rank;
                d.total_streams_billions = +d.total_streams_billions;
            });

            // Chart dimensions
            const margin = { top: 20, right: 30, bottom: 60, left: 60 };
            const containerWidth = document.querySelector('.container').offsetWidth;
            const width = containerWidth - margin.left - margin.right - 40;
            const height = Math.max(400, data.length * 8);

            // Function to update chart
            function updateChart() {
                const songCount = +document.getElementById('songCount').value;
                const filteredData = data.slice(0, songCount);

                // Clear previous chart
                d3.select("#chart").html("");

                // Create SVG
                const svg = d3.select("#chart")
                    .append("svg")
                    .attr("width", width + margin.left + margin.right)
                    .attr("height", height + margin.top + margin.bottom)
                    .append("g")
                    .attr("transform", `translate(${margin.left},${margin.top})`);

                // Create scales
                const xScale = d3.scaleLinear()
                    .domain([0, d3.max(filteredData, d => d.total_streams_billions)])
                    .range([0, width]);

                const yScale = d3.scaleBand()
                    .domain(filteredData.map((d, i) => i))
                    .range([0, height])
                    .padding(0.3);

                // Create bars
                svg.selectAll(".bar")
                    .data(filteredData)
                    .enter()
                    .append("rect")
                    .attr("class", "bar")
                    .attr("x", 0)
                    .attr("y", (d, i) => yScale(i))
                    .attr("width", d => xScale(d.total_streams_billions))
                    .attr("height", yScale.bandwidth())
                    .on("mouseover", function(event, d) {
                        d3.select("#tooltip")
                            .style("display", "block")
                            .style("left", (event.pageX + 10) + "px")
                            .style("top", (event.pageY - 10) + "px")
                            .html(`<strong>${d.song_title}</strong><br/>${d.artist}<br/>${d.total_streams_billions}B streams`);
                    })
                    .on("mousemove", function(event) {
                        d3.select("#tooltip")
                            .style("left", (event.pageX + 10) + "px")
                            .style("top", (event.pageY - 10) + "px");
                    })
                    .on("mouseout", function() {
                        d3.select("#tooltip").style("display", "none");
                    });

                // Add value labels on bars
                svg.selectAll(".value-label")
                    .data(filteredData)
                    .enter()
                    .append("text")
                    .attr("class", "value-label")
                    .attr("x", d => xScale(d.total_streams_billions) - 5)
                    .attr("y", (d, i) => yScale(i) + yScale.bandwidth() / 2)
                    .attr("dy", "0.35em")
                    .attr("text-anchor", "end")
                    .text(d => d.total_streams_billions.toFixed(2) + "B");

                // Add song titles and artists
                svg.selectAll(".title-label")
                    .data(filteredData)
                    .enter()
                    .append("text")
                    .attr("class", "title-label")
                    .attr("x", -5)
                    .attr("y", (d, i) => yScale(i) + yScale.bandwidth() / 2)
                    .attr("dy", "0.35em")
                    .attr("text-anchor", "end")
                    .text(d => `${d.song_title} - ${d.artist}`)
                    .style("font-size", "10px");

                // Add X-axis
                svg.append("g")
                    .attr("transform", `translate(0,${height})`)
                    .call(d3.axisBottom(xScale).ticks(5))
                    .append("text")
                    .attr("x", width / 2)
                    .attr("y", 40)
                    .attr("fill", "#333")
                    .attr("text-anchor", "middle")
                    .attr("font-weight", "600")
                    .text("Total Streams (Billions)");

                // Add Y-axis
                svg.append("g")
                    .call(d3.axisLeft(yScale).tickFormat(() => ""))
                    .style("display", "none");

                // Add grid lines
                svg.append("g")
                    .attr("class", "grid")
                    .attr("opacity", 0.1)
                    .call(d3.axisBottom(xScale)
                        .tickSize(height)
                        .tickFormat("")
                        .ticks(5));
            }

            // Initial chart
            updateChart();

            // Update chart when input changes
            document.getElementById('songCount').addEventListener('change', updateChart);
            document.getElementById('songCount').addEventListener('input', updateChart);

        }).catch(error => {
            console.error("Error loading CSV:", error);
            d3.select(".container").append("p").text("Error loading data. Please ensure spotify_alltime_top100_songs.csv is in the same directory.");
        });
    </script>
</body>
</html>
